project_id = "wc2026"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Override the default recovery email so the link points at the Next.js
# callback (which calls verifyOtp) instead of GoTrue's /verify route.
# Local CLI builds the default link as host://verify (no /auth/v1 prefix),
# which Kong can't route — so we route through the app instead.
[auth.email.template.recovery]
subject = "Reset your password"
content_path = "./supabase/templates/recovery.html"

# Same fix for the signup confirmation email.
[auth.email.template.confirmation]
subject = "Confirm your email"
content_path = "./supabase/templates/confirmation.html"

# Same fix for the email-change confirmation email. With
# double_confirm_changes this template is sent to BOTH the current and new
# address (each gets its own token_hash); /auth/callback verifies the
# email_change OTP type.
[auth.email.template.email_change]
subject = "Confirm your email change"
content_path = "./supabase/templates/email_change.html"

[inbucket]
enabled = true
port = 54324
# Expose Mailpit's SMTP port to the host so local `next dev` can deliver the
# admin broadcast tool's test emails here (viewable at http://127.0.0.1:54324).
smtp_port = 54325
pop3_port = 54326

[analytics]
enabled = false

# Admin broadcast email sender. JWT verification is off — the function is gated
# by a shared secret (BROADCAST_SHARED_SECRET) that only the server-side Next
# route knows. Sends SMTP from Deno (the Cloudflare Worker can't open sockets).
[functions.send-broadcast]
verify_jwt = false
