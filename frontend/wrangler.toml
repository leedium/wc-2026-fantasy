name = "wc2026"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[secrets]
# SMTP_* now live on the send-broadcast Supabase Edge Function, not the Worker.
# The Worker only needs the shared secret it uses to call that function.
required = ["SUPABASE_SERVICE_ROLE_KEY","RESET_INTENT_SECRET","BROADCAST_SHARED_SECRET"]


# Environment variables are set via the Cloudflare dashboard or `wrangler secret put`.
# NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, NEXT_PUBLIC_APP_URL,
# and SUPABASE_SERVICE_ROLE_KEY must be configured for the deployed worker.
